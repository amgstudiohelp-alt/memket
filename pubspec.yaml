name: ardahan_kulubu
description: "Kars Ardahan (Memket) sosyal ağı."
publish_to: 'none'


version: 1.0.0+11

environment:
  sdk: ^3.10.7


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  webview_flutter: ^4.9.0
  onesignal_flutter: ^5.0.0
  connectivity_plus: ^5.0.2
  file_selector: ^1.1.0
  package_info_plus: ^4.2.0
  url_launcher: ^6.3.0
  share_plus: ^7.2.1
  shared_preferences: ^2.3.3
  webview_flutter_android: ^4.10.11
  webview_flutter_wkwebview: ^3.23.5
  flutter_native_splash: ^2.4.3
  in_app_update: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon_logo.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/LogoSplash.png"
  android_12:
    image: "assets/LogoSplash.png"
    color: "#FFFFFF"


